<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FF9500" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Suivi Production</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <!-- Init dark mode avant le rendu pour éviter le flash -->
  <script>if(localStorage.getItem('darkMode')==='1')document.documentElement.setAttribute('data-theme','dark');</script>
  <style>
    :root {
      --blue:   #007AFF; --green:  #34C759; --orange: #FF9500;
      --red:    #FF3B30; --purple: #AF52DE; --teal:   #5AC8FA;
      --bg:     #F2F2F7; --card:   #FFFFFF; --text:   #000000;
      --secondary: #8E8E93; --sep: #C6C6C8; --bg-alt: rgba(242,242,247,.7);
    }
    [data-theme="dark"] {
      --bg:        #1C1C1E; --card:      #2C2C2E; --text:      #FFFFFF;
      --secondary: #8E8E93; --sep:       #38383A; --bg-alt:    rgba(58,58,60,.5);
    }
    [data-theme="dark"] .auth-form input       { background: var(--card); color: var(--text); }
    [data-theme="dark"] table.schedule-table th { background: #3A3A3C; }
    [data-theme="dark"] .admin-login-box        { background: var(--card); }
    .row-alt { background: var(--bg-alt); }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; overflow: hidden;
    }

    /* ── AUTH ─────────────────────────────── */
    #login-screen, #change-password-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100dvh; padding: 32px;
    }
    #change-password-screen { display: none; }
    .auth-header { text-align: center; margin-bottom: 44px; }
    .auth-header h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
    .auth-header p  { font-size: 17px; color: var(--secondary); margin-top: 4px; }
    .auth-form { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
    .auth-form input {
      width: 100%; padding: 15px 16px;
      border: 1px solid var(--sep); border-radius: 12px;
      font-size: 17px; background: var(--card);
      outline: none; appearance: none; transition: border-color .15s;
    }
    .auth-form input:focus { border-color: var(--blue); }
    .auth-error { color: var(--red); font-size: 14px; text-align: center; min-height: 18px; }

    /* ── BUTTONS ──────────────────────────── */
    .btn-primary {
      width: 100%; padding: 16px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:disabled { opacity: .35; }
    .btn-primary:active   { opacity: .75; }
    .btn-danger {
      width: 100%; padding: 16px;
      background: rgba(255,59,48,.1); color: var(--red);
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 600; cursor: pointer;
    }
    .btn-danger:active { opacity: .7; }

    /* ── APP ──────────────────────────────── */
    #app { display: none; flex-direction: column; height: 100dvh; }
    header {
      background: var(--card); border-bottom: 1px solid var(--sep);
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .header-left      { display: flex; align-items: center; gap: 8px; }
    header h1         { font-size: 20px; font-weight: 700; }
    .admin-lock-btn   { background: none; border: none; cursor: pointer; font-size: 17px; opacity: .4; padding: 2px 4px; line-height: 1; }
    .admin-lock-btn:active { opacity: .8; }
    main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── OFFLINE BAR ──────────────────────── */
    #offline-bar {
      display: none; background: var(--orange); color: #fff;
      font-size: 13px; font-weight: 500; align-items: center;
      padding: 7px 16px; flex-shrink: 0; gap: 6px;
    }

    /* ── UPDATE BAR ───────────────────────── */
    #update-bar {
      display: none; background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 500; align-items: center;
      padding: 7px 16px; flex-shrink: 0; gap: 6px;
    }

    /* ── NAV ──────────────────────────────── */
    nav {
      background: var(--card); border-top: 1px solid var(--sep);
      display: flex; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0;
    }
    nav button {
      flex: 1; border: none; background: transparent;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 8px 0; gap: 3px; cursor: pointer;
      color: var(--secondary); font-size: 10px; font-weight: 500;
    }
    nav button.active { color: var(--blue); }
    nav button svg { width: 24px; height: 24px; }

    /* ── TABS ─────────────────────────────── */
    .tab-page        { display: none; padding: 12px 14px 28px; }
    .tab-page.active { display: block; }

    /* ── CARD ─────────────────────────────── */
    .card { background: var(--card); border-radius: 16px; padding: 14px; margin-bottom: 12px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

    /* ── SECTION HEADER ───────────────────── */
    .section-header {
      font-size: 13px; font-weight: 600; color: var(--secondary);
      text-transform: uppercase; letter-spacing: .4px;
      margin: 16px 0 6px 4px;
    }
    .section-header:first-child { margin-top: 4px; }

    /* ── PLANNING TABLE ───────────────────── */
    .schedule-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .schedule-title  { font-size: 15px; font-weight: 600; }
    .week-type-badge { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .badge-matin { background: rgba(255,149,0,.15); color: var(--orange); }
    .badge-aprem { background: rgba(0,122,255,.15);  color: var(--blue); }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.schedule-table { border-collapse: collapse; width: 100%; font-size: 12px; }
    table.schedule-table th {
      background: #F2F2F7; color: var(--secondary); font-weight: 600;
      padding: 6px 2px; text-align: center; min-width: 44px;
    }
    table.schedule-table td {
      padding: 5px 3px; text-align: center;
      border-top: 1px solid var(--sep); min-width: 44px;
    }
    .cat-label { text-align: left !important; font-weight: 600; padding-left: 4px !important; min-width: 60px; }
    .visa-me, .visa-col { border-radius: 4px; padding: 1px 3px; }
    .visa-me { font-weight: 700; }
    .visa-me.cat-zac1,      .visa-col.cat-zac1      { color: #007AFF; }
    .visa-me.cat-zac2,      .visa-col.cat-zac2      { color: #34C759; }
    .visa-me.cat-verif,     .visa-col.cat-verif     { color: #AF52DE; }
    .visa-me.cat-formation, .visa-col.cat-formation { color: #5AC8FA; }
    .visa-me.cat-conges,    .visa-col.cat-conges    { color: #FF9500; }
    .visa-me.cat-maladie,   .visa-col.cat-maladie   { color: #FF3B30; }
    .visa-me.cat-zac1      { background: rgba(0,122,255,.12); }
    .visa-me.cat-zac2      { background: rgba(52,199,89,.12); }
    .visa-me.cat-verif     { background: rgba(175,82,222,.12); }
    .visa-me.cat-formation { background: rgba(90,200,250,.12); }
    .visa-me.cat-conges    { background: rgba(255,149,0,.12); }
    .visa-me.cat-maladie   { background: rgba(255,59,48,.12); }
    .day-status { font-size: 11px; font-weight: 600; padding: 2px 4px; border-radius: 4px; }
    .status-ferme { color: var(--red);    background: rgba(255,59,48,.1); }
    .status-ferie { color: var(--purple); background: rgba(175,82,222,.1); }

    /* ── MA SEMAINE ───────────────────────── */
    .my-day-card {
      background: var(--card); border-radius: 14px;
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
    }
    .my-day-date       { text-align: center; min-width: 36px; }
    .day-name          { font-size: 11px; font-weight: 600; color: var(--secondary); text-transform: uppercase; }
    .day-num           { font-size: 22px; font-weight: 700; line-height: 1; }
    .day-month         { font-size: 10px; color: var(--secondary); }
    .my-day-divider    { width: 1px; height: 48px; background: var(--sep); }
    .my-day-info       { flex: 1; }
    .my-day-cat        { font-size: 16px; font-weight: 600; }
    .my-day-end        { font-size: 13px; color: var(--secondary); }
    .my-day-colleagues { font-size: 12px; color: var(--secondary); margin-top: 2px; }
    .my-day-production { font-size: 13px; font-weight: 600; margin-top: 4px; }

    /* ── SAISIE ───────────────────────────── */
    .form-section { margin-bottom: 14px; }
    .form-label   { font-size: 13px; font-weight: 600; color: var(--secondary); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; padding-left: 4px; }
    .form-row     { background: var(--card); border-radius: 12px; overflow: hidden; }
    .form-field   { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid var(--sep); }
    .form-field:last-child { border-bottom: none; }
    .form-field label { flex: 1; font-size: 16px; }
    .stepper      { display: flex; align-items: center; gap: 10px; }
    .stepper button {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--blue); color: #fff; border: none;
      font-size: 22px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .stepper button:active { opacity: .7; }
    .stepper span { font-size: 18px; font-weight: 600; min-width: 28px; text-align: center; }
    .stepper-input {
      font-size: 18px; font-weight: 600; width: 54px; text-align: center;
      border: 1px solid var(--sep); border-radius: 8px; padding: 3px 4px;
      background: var(--card); color: var(--text); outline: none;
      -moz-appearance: textfield;
    }
    .stepper-input:focus { border-color: var(--blue); }
    .stepper-input::-webkit-outer-spin-button,
    .stepper-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .segment-control { display: flex; background: var(--card); border-radius: 12px; padding: 2px; }
    .segment-control button {
      flex: 1; padding: 8px 4px; border: none; border-radius: 10px;
      background: transparent; font-size: 13px; cursor: pointer; transition: all .15s; color: var(--text);
    }
    .segment-control button.active { background: var(--blue); color: #fff; font-weight: 600; }

    /* ── STATS ────────────────────────────── */
    .kpi-row  { display: flex; gap: 10px; margin-bottom: 12px; }
    .kpi-card {
      flex: 1; background: var(--card); border-radius: 14px;
      padding: 14px 10px; text-align: center;
    }
    .kpi-val   { font-size: 26px; font-weight: 700; line-height: 1; }
    .kpi-label { font-size: 11px; color: var(--secondary); margin-top: 4px; font-weight: 500; }
    .bar-chart {
      display: flex; align-items: flex-end; gap: 6px;
      height: 120px; overflow-x: auto; padding-bottom: 24px; position: relative;
    }
    .bar-col   { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; min-width: 36px; height: 100%; justify-content: flex-end; }
    .bar-wrap  { width: 100%; display: flex; flex-direction: column; justify-content: flex-end; height: 96px; gap: 2px; }
    .bar       { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; }
    .bar-pieces  { background: var(--blue); }
    .bar-rejects { background: rgba(255,59,48,.5); }
    .bar-lbl   { font-size: 9px; color: var(--secondary); text-align: center; white-space: nowrap; }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--sep);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row span:first-child { font-size: 15px; }
    .stat-val { font-size: 15px; font-weight: 600; }
    .model-row    { padding: 10px 0; border-bottom: 1px solid var(--sep); }
    .model-row:last-child { border-bottom: none; }
    .model-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 15px; }
    .model-bar-bg   { height: 6px; background: var(--sep); border-radius: 3px; overflow: hidden; }
    .model-bar-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .4s; }

    /* ── DATE NAV ────────────────────────── */
    .date-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: 14px;
      padding: 10px 8px; margin-bottom: 12px; position: relative;
    }
    .date-nav-btn {
      background: none; border: none; font-size: 26px; font-weight: 300;
      color: var(--blue); cursor: pointer; padding: 4px 10px; line-height: 1;
    }
    .date-nav-btn:disabled { color: var(--sep); cursor: default; }
    .date-nav-label {
      flex: 1; font-size: 16px; font-weight: 600; text-align: center;
      background: none; border: none; cursor: pointer; color: var(--text); padding: 4px 0;
    }

    /* ── SUMMARY BAR ─────────────────────── */
    .summary-bar {
      display: flex; background: var(--card); border-radius: 14px;
      margin-bottom: 12px; overflow: hidden;
    }
    .summary-kpi { flex: 1; padding: 14px 8px; text-align: center; }
    .summary-val { font-size: 24px; font-weight: 700; line-height: 1; }
    .summary-lbl { font-size: 11px; color: var(--secondary); margin-top: 4px; font-weight: 500; }
    .summary-sep { width: 1px; background: var(--sep); margin: 12px 0; }

    /* ── ENTRY ROWS ──────────────────────── */
    .entry-row      { display: flex; align-items: center; padding: 13px 16px; }
    .entry-row-sep  { border-bottom: 1px solid var(--sep); }
    .entry-row-info { flex: 1; min-width: 0; }
    .entry-model    { font-size: 15px; font-weight: 600; }
    .entry-detail   { font-size: 13px; color: var(--secondary); margin-top: 2px; }
    .entry-row-btns { display: flex; gap: 4px; margin-left: 10px; }
    .entry-btn      { background: none; border: none; font-size: 18px; cursor: pointer; padding: 6px; }
    .entry-btn-del  { opacity: .55; }
    .entry-pending  { opacity: .75; }
    .pending-badge  { font-size: 12px; }

    /* ── SHEET ───────────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.45);
      display: none; align-items: flex-end;
    }
    .sheet-overlay.open { display: flex; animation: fadeInBg .2s ease; }
    .sheet-content {
      background: var(--bg); width: 100%;
      border-radius: 20px 20px 0 0;
      max-height: 90dvh; overflow-y: auto;
      padding-bottom: env(safe-area-inset-bottom);
      animation: slideUp .25s cubic-bezier(.32,0,.67,0);
    }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--sep);
      border-radius: 2px; margin: 10px auto 0;
    }
    .sheet-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid var(--sep);
    }
    .sheet-header span { font-size: 17px; font-weight: 600; }
    .sheet-cancel-btn  { background: none; border: none; font-size: 16px; color: var(--secondary); cursor: pointer; padding: 4px 8px; }
    .sheet-save-btn    { background: none; border: none; font-size: 16px; font-weight: 600; color: var(--blue); cursor: pointer; padding: 4px 8px; }
    .sheet-save-btn:disabled { opacity: .35; }
    @keyframes fadeInBg { from { background: transparent; } to { background: rgba(0,0,0,.45); } }
    @keyframes slideUp  { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* ── SPINNER ──────────────────────────── */
    .spinner-wrap { display:flex; justify-content:center; padding:56px; }
    .spinner {
      width:32px; height:32px; border:3px solid var(--sep);
      border-top-color:var(--blue); border-radius:50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DARK MODE TOGGLE ────────────────── */
    .header-right    { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    #header-visa     { font-size: 13px; font-weight: 600; color: var(--secondary); }
    .theme-toggle    { display: flex; align-items: center; gap: 5px; }
    .theme-icon      { width: 13px; height: 13px; color: var(--secondary); flex-shrink: 0; }
    .toggle-sw       { position: relative; width: 34px; height: 18px; cursor: pointer; flex-shrink: 0; }
    .toggle-sw input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 9px;
      background: var(--sep); transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25);
      transition: transform .2s;
    }
    .toggle-sw input:checked ~ .toggle-track { background: #5856D6; }
    .toggle-sw input:checked ~ .toggle-track::after { transform: translateX(16px); }

    /* ── EMPTY STATE ──────────────────────── */
    .empty-state { text-align: center; padding: 56px 24px; color: var(--secondary); }
    .empty-state svg   { width: 56px; height: 56px; margin-bottom: 14px; opacity: .35; }
    .empty-state p     { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-state small { font-size: 14px; }

    /* ── ADMIN ────────────────────────────── */
    .admin-section-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .admin-add-btn {
      background: var(--blue); color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600;
      padding: 6px 12px; cursor: pointer;
    }
    .admin-add-btn:active { opacity: .75; }
    .abadge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px; vertical-align: middle;
    }
    .abadge-ok   { background: rgba(52,199,89,.15);   color: var(--green);  }
    .abadge-warn { background: rgba(255,149,0,.15);   color: var(--orange); }
    .abadge-sec  { background: rgba(142,142,147,.15); color: var(--secondary); }

    /* Admin login centré (pas une bottom sheet) */
    #admin-login-sheet {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.5);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    #admin-login-sheet.open { display: flex; animation: fadeInBg .2s ease; }
    .admin-login-box {
      background: var(--bg); border-radius: 20px;
      padding: 24px; width: 100%; max-width: 340px;
      animation: scaleIn .2s ease;
    }
    .admin-login-box h2 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .admin-login-box p  { font-size: 14px; color: var(--secondary); text-align: center; margin-bottom: 16px; }
    .admin-login-box input {
      width: 100%; padding: 14px 16px;
      border: 1px solid var(--sep); border-radius: 12px;
      font-size: 17px; background: var(--card); color: var(--text);
      outline: none; margin-bottom: 8px;
    }
    .admin-login-box input:focus { border-color: var(--blue); }
    .admin-login-actions { display: flex; gap: 10px; margin-top: 4px; }
    .admin-login-actions button { flex: 1; }
    .btn-secondary {
      padding: 14px; background: var(--bg-alt); color: var(--text);
      border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .btn-secondary:active { opacity: .7; }
    @keyframes scaleIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* Sched editor full-height sheet */
    #sched-editor-sheet .sheet-content { max-height: 96dvh; }
    #sched-editor-body { padding: 14px; }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────── -->
<div id="login-screen">
  <div class="auth-header">
    <h1>Suivi Production</h1>
    <p>EuroSilicone</p>
  </div>
  <div class="auth-form">
    <input id="login-visa" type="text" placeholder="Visa (ex : JDU)"
           autocomplete="username" autocapitalize="characters" autocorrect="off" spellcheck="false" />
    <input id="login-pass" type="password" placeholder="Mot de passe"
           autocomplete="current-password" inputmode="numeric" />
    <div class="auth-error" id="login-error"></div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Se connecter</button>
  </div>
</div>

<!-- ── CHANGE PASSWORD ─────────────────────── -->
<div id="change-password-screen">
  <div class="auth-header">
    <h1>Nouveau mot de passe</h1>
    <p>Choisis un mot de passe pour ton compte</p>
  </div>
  <div class="auth-form">
    <input id="new-pass1" type="password" placeholder="Nouveau mot de passe" inputmode="numeric" />
    <input id="new-pass2" type="password" placeholder="Confirmer"            inputmode="numeric" />
    <div class="auth-error" id="change-error"></div>
    <button class="btn-primary" onclick="handleChangePassword()">Enregistrer</button>
  </div>
</div>

<!-- ── APP ────────────────────────────────── -->
<div id="app">
  <header>
    <div class="header-left">
      <h1 id="header-title">Planning</h1>
      <button class="admin-lock-btn" id="admin-lock-btn" onclick="handleAdminLockBtn()" title="Mode admin">🔒</button>
    </div>
    <div class="header-right">
      <div class="theme-toggle">
        <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <label class="toggle-sw">
          <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode(this.checked)">
          <span class="toggle-track"></span>
        </label>
        <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </div>
      <div id="header-visa"></div>
    </div>
  </header>

  <!-- Bandeau hors ligne -->
  <div id="offline-bar"></div>
  <!-- Bandeau mise à jour -->
  <div id="update-bar"></div>

  <main>
    <div id="tab-planning" class="tab-page active"></div>
    <div id="tab-myweek"   class="tab-page"></div>
    <div id="tab-entry"    class="tab-page"></div>
    <div id="tab-stats"    class="tab-page"></div>
    <div id="tab-admin"    class="tab-page"></div>
  </main>

  <nav>
    <button class="active" onclick="showTab('planning',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      Planning
    </button>
    <button onclick="showTab('myweek',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      Ma semaine
    </button>
    <button onclick="showTab('entry',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Saisie
    </button>
    <button onclick="showTab('stats',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      Stats
    </button>
    <!-- Bouton admin, caché par défaut -->
    <button id="nav-admin-btn" style="display:none" onclick="showTab('admin',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        <line x1="18" y1="3" x2="22" y2="3"/><line x1="20" y1="1" x2="20" y2="5"/>
      </svg>
      Admin
    </button>
  </nav>
</div>

<!-- ── ENTRY SHEET ──────────────────────────── -->
<div id="entry-sheet" class="sheet-overlay" onclick="closeEntrySheetIfBackdrop(event)">
  <div class="sheet-content">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-cancel-btn" onclick="closeEntrySheet()">Annuler</button>
      <span id="sheet-title">Nouvelle saisie</span>
      <button class="sheet-save-btn" id="sheet-save-btn" onclick="saveEntrySheet()">Ajouter</button>
    </div>
    <div id="sheet-body"></div>
  </div>
</div>

<!-- ── ADMIN LOGIN ──────────────────────────── -->
<div id="admin-login-sheet" onclick="closeAdminLoginIfBackdrop(event)">
  <div class="admin-login-box">
    <h2>🔒 Mode admin</h2>
    <p>Entrez le mot de passe administrateur</p>
    <input id="admin-pass-input" type="password" placeholder="Mot de passe admin" autocomplete="off" />
    <div class="auth-error" id="admin-pass-error"></div>
    <div class="admin-login-actions">
      <button class="btn-secondary" onclick="closeAdminLoginSheet()">Annuler</button>
      <button class="btn-primary" style="padding:14px" onclick="handleAdminLogin()">Connexion</button>
    </div>
  </div>
</div>

<!-- ── ADD VISA SHEET ───────────────────────── -->
<div id="add-visa-sheet" class="sheet-overlay" onclick="closeAddVisaIfBackdrop(event)">
  <div class="sheet-content">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-cancel-btn" onclick="closeAddVisaSheet()">Annuler</button>
      <span>Nouveau membre</span>
      <button class="sheet-save-btn" onclick="saveAddVisa()">Ajouter</button>
    </div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
      <p style="font-size:14px;color:var(--secondary)">Un compte sera créé avec le code 0000 (à changer à la première connexion).</p>
      <input id="add-visa-input" type="text" placeholder="Visa (ex : JDU)"
             autocapitalize="characters" autocorrect="off" spellcheck="false" maxlength="6"
             style="padding:14px 16px;border:1px solid var(--sep);border-radius:12px;font-size:17px;background:var(--card);color:var(--text);outline:none"
             oninput="this.value=this.value.toUpperCase()" />
      <div class="auth-error" id="add-visa-error"></div>
    </div>
  </div>
</div>

<!-- ── MODEL SHEET ──────────────────────────── -->
<div id="model-sheet" class="sheet-overlay" onclick="closeModelSheetIfBackdrop(event)">
  <div class="sheet-content">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-cancel-btn" onclick="closeModelSheet()">Annuler</button>
      <span id="model-sheet-title">Nouveau modèle</span>
      <button class="sheet-save-btn" onclick="saveModelSheet()">Enregistrer</button>
    </div>
    <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
      <div class="form-row">
        <div class="form-field">
          <label>Nom du modèle</label>
          <input id="model-name-input" type="text" placeholder="ex : Modèle A"
                 style="border:none;background:transparent;font-size:16px;color:var(--blue);outline:none;text-align:right;max-width:160px"
                 autocorrect="off" spellcheck="false" />
        </div>
        <div class="form-field">
          <label>Moules par série</label>
          <div class="stepper">
            <button onclick="modelMoldsStep(-1)">−</button>
            <input type="number" id="model-molds-val" class="stepper-input" value="27" min="1" max="9999"
              onfocus="this.select()" onchange="modelMoldsSet(+this.value)" />
            <button onclick="modelMoldsStep(1)">+</button>
          </div>
        </div>
      </div>
      <div class="auth-error" id="model-sheet-error"></div>
    </div>
  </div>
</div>

<!-- ── SCHEDULE EDITOR SHEET ────────────────── -->
<div id="sched-editor-sheet" class="sheet-overlay" onclick="closeSchedEditorIfBackdrop(event)">
  <div class="sheet-content">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button class="sheet-cancel-btn" onclick="closeScheduleEditor()">Annuler</button>
      <span id="sched-editor-title">Nouveau planning</span>
      <button class="sheet-save-btn" id="sched-editor-save-btn" onclick="saveScheduleEditor()">Enregistrer</button>
    </div>
    <div id="sched-editor-body"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
